<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <style>
        body {
            width: 260px;
            margin: 15px;
            font-family: sans-serif;
        }

        h3 {
            margin-top: 0;
            font-size: 16px;
        }

        p {
            font-size: 12px;
            color: #555;
        }

        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
            background: #0b62c2;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background: #094f9c;
        }
    </style>
</head>

<body>
    <h3>スプシ一括取得ツール</h3>
    <p>専用の操作画面を開きます。</p>
    <button id="open">ツール画面を開く</button>
    <script src="popup.js"></script>

</html>
